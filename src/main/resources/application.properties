# ============================================================
#  StockMaster - Application Configuration
# ============================================================

# ---- PostgreSQL DataSource (R6: JDBC, R7: JPA) ----
spring.datasource.url=jdbc:postgresql://localhost:5432/stockmaster
spring.datasource.username=stockuser
spring.datasource.password=stockpass
spring.datasource.driver-class-name=org.postgresql.Driver

# ---- HikariCP connection pool (shared by JPA and direct JDBC) ----
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=2
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.pool-name=StockMasterHikariPool

# ---- JPA / Hibernate (R7) ----
# 'update' lets Hibernate create/alter tables from the @Entity classes on startup.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
# Keep the JPA session open through view rendering so lazy associations
# (e.g. Product.supplier) serialize without LazyInitializationException.
spring.jpa.open-in-view=true

# ---- Web server ----
server.port=8080

# ---- JSON output formatting ----
spring.jackson.serialization.indent-output=true
